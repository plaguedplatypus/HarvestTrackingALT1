<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet"
          type="text/css"
          href="https://runeapps.org/nis/nis.css" />

    <link rel="stylesheet"
          type="text/css"
          href="https://runeapps.org/runeappslib.css" />
</head>

<body class="nis">
    <div class="app">
        <div class="topbar">
            <div class="title">Plague's Resource Tracker</div>
        </div>
        <div class="skill-tabs">
            <button class="skill-tab active" data-skill="all">All</button>
            <button class="skill-tab" data-skill="mining" title="Mining">
                <img src="./mining.png" alt="Mining">
            </button>

            <button class="skill-tab" data-skill="woodcutting" title="Woodcutting">
                <img src="./woodcutting.png" alt="Woodcutting">
            </button>

            <button class="skill-tab" data-skill="fishing" title="Fishing">
                <img src="./fishing.png" alt="Fishing">
            </button>

            <button class="skill-tab" data-skill="archaeology" title="Archaeology">
                <img src="./archaeology.png" alt="Archaeology">
            </button>

            <button class="skill-tab" data-skill="invention" title="Invention">
                <img src="./invention.png" alt="Invention">
            </button>

            <button class="skill-tab" data-skill="seren" title="Seren">
                <img src="./Seren.png" alt="Seren">
            </button>

        </div>

<div class="invention-filters">
	<button data-filter="all" class="invention-filter active">All</button>
	<button data-filter="rare" class="invention-filter">Rare</button>
	<button data-filter="uncommon" class="invention-filter">Uncommon</button>
	<button data-filter="common" class="invention-filter">Common</button>
</div>

<label class="fishing-mode">
	<input type="checkbox" class="fishing-porters" checked>
	Using Porters/GOTE
</label>

        <div class="tracker"></div>
        <div class="action-buttons">
            <button class="clear tab-clear">Clear All</button>
            <button class="sort-button">Sort: A-Z</button>
        </div>
        <div class="footer">
            <span class="status">Initializing...</span>
        </div>
        <div class="app-settings">
          <button class="app-cog">⚙</button>

        <div class="app-settings-panel">
            <select class="chat">
            <option value="">Select Chat</option>
            </select>

            <button class="export">Export</button>

            <label class="import-label">
            Import
            <input class="import" type="file" accept=".json">
            </label>

        </div>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
