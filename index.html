<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet"
          type="text/css"
          href="https://runeapps.org/nis/nis.css" />

    <link rel="stylesheet"
          type="text/css"
          href="https://runeapps.org/runeappslib.css" />
</head>

<body class="nis">
    <div class="app">
        <div class="topbar">
            <div class="title">Harvest Tracker</div>

            <div class="controls">
                <select class="chat">
                    <option value="">Select Chat</option>
                </select>

                <button class="export">Export</button>
                <label class="import-label">
                    Import
                    <input class="import" type="file" accept=".json">
                </label>
                <button class="clear">Clear</button>
            </div>
        </div>

        <div class="tracker"></div>

        <div class="footer">
            <span class="status">Initializing...</span>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
