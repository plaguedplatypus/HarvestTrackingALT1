<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet"
          type="text/css"
          href="https://runeapps.org/nis/nis.css" />

    <link rel="stylesheet"
          type="text/css"
          href="https://runeapps.org/runeappslib.css" />
</head>

<body class="nis">
    <div class="app">
        <div class="topbar">
            <div class="title">Gathering Tracker</div>
        </div>
        <div class="skill-tabs">
            <button class="skill-tab active" data-skill="all">All</button>
            <button class="skill-tab" data-skill="mining">⛏</button>
            <button class="skill-tab" data-skill="woodcutting">🌳</button>
            <button class="skill-tab" data-skill="fishing">🎣</button>
            <button class="skill-tab" data-skill="archaeology">🏺</button>
            <button class="skill-tab" data-skill="other">?</button>
        </div>

        <div class="tracker"></div>

        <div class="footer">
            <span class="status">Initializing...</span>
        </div>
        <div class="app-settings">
          <button class="app-cog">⚙</button>

        <div class="app-settings-panel">
            <select class="chat">
            <option value="">Select Chat</option>
            </select>

            <button class="export">Export</button>

            <label class="import-label">
            Import
            <input class="import" type="file" accept=".json">
            </label>

            <button class="clear">Clear</button>
        </div>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
